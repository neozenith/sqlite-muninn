name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Code Quality ───────────────────────────────────────
  quality:
    runs-on: ubuntu-22.04
    name: Code Quality
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Sync Python dev tools (skip heavy project deps)
        run: uv sync --group dev --no-install-project

      - name: Install Node.js dependencies
        run: npm --prefix npm ci

      - name: Lint C (clang-format)
        run: |
          sudo apt-get install -y clang-format
          make lint-c

      - name: Lint Python (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Lint TypeScript (biome)
        run: make lint-js

      - name: Type-check Python (mypy)
        run: uv run mypy sqlite_muninn/

      - name: Type-check TypeScript (tsc)
        run: make typecheck-js

  # ── Linux x86_64 (Build + Test) ─────────────────────────
  linux-x64:
    needs: [quality]
    runs-on: ubuntu-22.04
    name: Build (Linux x86_64)
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ubuntu-22.04
          evict-old-files: 1d

      - name: Build extension
        run: make all

      - name: Run C unit tests
        run: make test

      - name: SQLite CLI smoke test
        run: |
          sqlite3 :memory: ".load ./build/muninn" "SELECT 1"

      - name: Cache .venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-ubuntu-22.04-${{ hashFiles('uv.lock') }}

      - name: Sync Python environment
        run: uv sync --group dev

      - uses: actions/cache@v5
        with:
          path: models
          key: gguf-models-${{ hashFiles('pytests/test_embed_gguf.py') }}

      - name: Python integration tests
        run: uv run pytest pytests/ -v

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: TypeScript tests
        run: |
          npm --prefix npm ci
          npm --prefix npm test

      - uses: actions/upload-artifact@v7
        with:
          name: muninn-linux-x86_64
          path: build/muninn.so

  # ── Linux ARM64 (Build + Test) ─────────────────────────
  linux-arm64:
    needs: [quality]
    runs-on: ubuntu-22.04-arm
    name: Build (Linux ARM64)
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ubuntu-22.04-arm
          evict-old-files: 1d

      - name: Build extension
        run: make all

      - name: Run C unit tests
        run: make test

      - name: SQLite CLI smoke test
        run: |
          sqlite3 :memory: ".load ./build/muninn" "SELECT 1"

      - name: Cache .venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-ubuntu-22.04-arm-${{ hashFiles('uv.lock') }}

      - name: Sync Python environment
        run: uv sync --group dev

      - uses: actions/cache@v5
        with:
          path: models
          key: gguf-models-${{ hashFiles('pytests/test_embed_gguf.py') }}

      - name: Python integration tests
        run: uv run pytest pytests/ -v

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: TypeScript tests
        run: |
          npm --prefix npm ci
          npm --prefix npm test

      - uses: actions/upload-artifact@v7
        with:
          name: muninn-linux-arm64
          path: build/muninn.so

  # ── Windows x86_64 (Build only) ────────────────────────
  windows-x64:
    needs: [quality]
    runs-on: windows-2022
    name: Build (Windows x86_64)
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Generate Windows build script
        run: python3 scripts/generate_build.py windows

      - name: Build extension
        shell: cmd
        run: build\generated\build_windows.bat

      - uses: actions/upload-artifact@v7
        with:
          name: muninn-windows-x86_64
          path: build/muninn.dll

  # ── macOS arm64 (Build + Test) ───────────────────────────
  macos-arm64:
    needs: [quality]
    runs-on: macos-15
    name: Build (macOS arm64)
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: macos-arm64
          evict-old-files: 1d

      - name: Build extension (arm64)
        run: make ARCH=arm64 all

      - name: Run C unit tests
        run: make test

      - name: SQLite CLI smoke test
        run: |
          SQLITE3="$(brew --prefix sqlite)/bin/sqlite3"
          "$SQLITE3" :memory: ".load ./build/muninn" "SELECT 1"

      # ── Python integration tests ─────────────────────────
      - name: Cache .venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-macos-${{ hashFiles('uv.lock') }}

      - name: Sync Python environment (pysqlite3 from source against Homebrew SQLite)
        run: |
          CFLAGS="-I$(brew --prefix sqlite)/include" \
          LDFLAGS="-L$(brew --prefix sqlite)/lib" \
            uv sync --group dev --no-binary-package pysqlite3

      - uses: actions/cache@v5
        with:
          path: models
          key: gguf-models-${{ hashFiles('pytests/test_embed_gguf.py') }}

      - name: Verify sqlite3 has extension loading
        run: uv run scripts/verify_sqlite3_ext.py

      - name: Python integration tests
        run: uv run pytest pytests/ -v

      # ── Node.js tests ────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: TypeScript tests
        run: |
          npm --prefix npm ci
          npm --prefix npm test

      - uses: actions/upload-artifact@v7
        with:
          name: muninn-macos-arm64
          path: build/muninn.dylib

  # ── macOS x86_64 (Build only, cross-compile) ────────────
  macos-x86_64:
    needs: [quality]
    runs-on: macos-15
    name: Build (macOS x86_64)
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: macos-x86_64
          evict-old-files: 1d

      - name: Build extension (x86_64)
        run: make ARCH=x86_64 all

      - uses: actions/upload-artifact@v7
        with:
          name: muninn-macos-x86_64
          path: build/muninn.dylib

  # ── macOS Universal Binary (lipo combine only) ──────────
  macos-universal:
    needs: [macos-arm64, macos-x86_64]
    runs-on: macos-15
    name: Build (macOS Universal)
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: muninn-macos-arm64
          path: arm64/

      - uses: actions/download-artifact@v7
        with:
          name: muninn-macos-x86_64
          path: x86_64/

      - name: Create universal binary
        run: |
          mkdir -p build
          lipo -create arm64/muninn.dylib x86_64/muninn.dylib -output build/muninn.dylib
          lipo -info build/muninn.dylib

      - uses: actions/upload-artifact@v7
        with:
          name: muninn-macos-universal
          path: build/muninn.dylib

  # ── Sanitizers (Linux only) ──────────────────────────────
  sanitize:
    needs: [quality]
    runs-on: ubuntu-22.04

    name: Sanitize (ASan+UBSan)
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # No ccache here: --coverage needs real compilation to produce .gcno files
      - name: Install build dependencies
        run: sudo apt-get install -y libsqlite3-dev llvm

      - name: Build and test with ASan+UBSan
        run: |
          CCACHE_DISABLE=1 GCOV_EXECUTABLE="llvm-cov gcov" CC=clang make test \
            CFLAGS_EXTRA="-fsanitize=address,undefined -fno-sanitize-recover=all -g -O1 -fno-omit-frame-pointer"

  # ── Amalgamation ─────────────────────────────────────────
  amalgamation:
    needs: [quality]
    runs-on: ubuntu-22.04
    name: Amalgamation
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Create amalgamation
        run: make amalgamation

      - name: Verify amalgamation compiles (syntax check only)
        run: |
          cc -O2 -fPIC -shared dist/muninn.c -o dist/muninn.so \
            -Ivendor/llama.cpp/include -Ivendor/llama.cpp/ggml/include \
            -lm 2>&1 || echo "Note: link errors expected without llama.cpp libs"
          ls -la dist/muninn.c dist/muninn.h

      - uses: actions/upload-artifact@v7
        with:
          name: amalgamation
          path: |
            dist/muninn.c
            dist/muninn.h

  # ── Package Install Tests ────────────────────────────────
  package-install:
    needs: [quality]
    runs-on: ubuntu-22.04
    name: Package Install Tests
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ubuntu-22.04
          evict-old-files: 1d

      - name: Install SQLite dev headers
        run: sudo apt-get install -y libsqlite3-dev

      - name: Build extension
        run: make all

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build npm package
        run: |
          npm --prefix npm ci
          npm --prefix npm run build

      - name: Run install integration tests
        run: |
          uv sync --group dev
          uv run pytest pytests/test_install.py -v -m integration --override-ini="addopts="

  # ── WASM Build ───────────────────────────────────────────
  wasm:
    needs: [quality]
    runs-on: ubuntu-22.04
    name: WASM Build
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: wasm
          evict-old-files: 1d

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build WASM (full, with llama.cpp)
        run: make build-wasm

      - uses: actions/upload-artifact@v7
        with:
          name: wasm
          path: |
            build/wasm/muninn_sqlite3.js
            build/wasm/muninn_sqlite3.wasm
