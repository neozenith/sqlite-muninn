name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Code Quality ───────────────────────────────────────
  quality:
    runs-on: ubuntu-22.04
    name: Code Quality
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync Python environment
        run: uv sync --group dev

      - name: Install Node.js dependencies
        run: npm --prefix npm ci

      - name: Lint C (clang-format)
        run: |
          sudo apt-get install -y clang-format
          make lint-c

      - name: Lint Python (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Lint TypeScript (biome)
        run: make lint-js

      - name: Type-check Python (mypy)
        run: uv run mypy sqlite_muninn/

      - name: Type-check TypeScript (tsc)
        run: make typecheck-js

  # ── Build & Test (Linux + Windows) ─────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux x86_64
            ext: so
          - os: ubuntu-22.04-arm
            name: Linux ARM64
            ext: so
          - os: windows-2022
            name: Windows x86_64
            ext: dll
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # ── ccache for C/C++ compilation ───────────────────
      - name: ccache
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}
          evict-old-files: 1d

      # ── Unix build ──────────────────────────────────────
      - name: Build extension (Unix)
        if: runner.os != 'Windows'
        run: make all

      - name: Run C unit tests
        if: runner.os != 'Windows'
        run: |
          sudo apt-get install -y libsqlite3-dev 2>/dev/null || true
          make test

      - name: SQLite CLI smoke test
        if: runner.os != 'Windows'
        run: |
          sqlite3 :memory: ".load ./build/muninn" "SELECT 1"

      # ── Windows build ───────────────────────────────────
      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Generate Windows build script
        if: runner.os == 'Windows'
        run: python3 scripts/generate_build.py windows

      - name: Build extension (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: build\generated\build_windows.bat

      # ── Python integration tests ────────────────────────
      - name: Cache .venv
        if: runner.os != 'Windows'
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ matrix.os }}-${{ hashFiles('uv.lock') }}

      - name: Sync Python environment
        if: runner.os != 'Windows'
        run: uv sync --group dev

      - uses: actions/cache@v5
        if: runner.os != 'Windows'
        with:
          path: models
          key: gguf-test-models

      - name: Python integration tests
        if: runner.os != 'Windows'
        run: uv run pytest pytests/ -v

      # ── Node.js tests ──────────────────────────────────
      - uses: actions/setup-node@v4
        if: runner.os != 'Windows'
        with:
          node-version: "22"

      - name: TypeScript tests
        if: runner.os != 'Windows'
        run: |
          npm --prefix npm ci
          npm --prefix npm test

      # ── Upload artifact ─────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: muninn-${{ matrix.name }}
          path: build/muninn.${{ matrix.ext }}

  # ── macOS Build ────────────────────────────────────────
  build-macos:
    runs-on: macos-15
    name: Build (macOS Universal)
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: macos-15
          evict-old-files: 1d

      # ── Build llama.cpp ──────────────────────────────────
      - name: Build llama.cpp (CMake configure)
        run: |
          LLAMA_CMAKE_FLAGS=$(uv run scripts/generate_build.py query LLAMA_CMAKE_FLAGS)
          echo "::group::CMake flags"
          echo "$LLAMA_CMAKE_FLAGS" | tr ' ' '\n'
          echo "::endgroup::"
          cmake -B vendor/llama.cpp/build -S vendor/llama.cpp $LLAMA_CMAKE_FLAGS

      - name: Build llama.cpp (compile)
        run: cmake --build vendor/llama.cpp/build --config MinSizeRel -j

      # ── Build muninn extension ───────────────────────────
      - name: Build muninn extension
        run: make all

      # ── C unit tests ─────────────────────────────────────
      - name: Run C unit tests
        run: make test

      # ── SQLite CLI smoke test ────────────────────────────
      - name: SQLite CLI smoke test
        run: |
          SQLITE3="$(brew --prefix sqlite)/bin/sqlite3"
          "$SQLITE3" :memory: ".load ./build/muninn" "SELECT 1"

      # ── Python integration tests ─────────────────────────
      - name: Cache .venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-macos-${{ hashFiles('uv.lock') }}

      - name: Sync Python environment (pysqlite3 from source against Homebrew SQLite)
        run: |
          CFLAGS="-I$(brew --prefix sqlite)/include" \
          LDFLAGS="-L$(brew --prefix sqlite)/lib" \
            uv sync --group dev --no-binary-package pysqlite3

      - uses: actions/cache@v5
        with:
          path: models
          key: gguf-test-models

      - name: Verify sqlite3 has extension loading
        run: uv run scripts/verify_sqlite3_ext.py

      - name: Python integration tests
        run: uv run pytest pytests/ -v

      # ── Node.js tests ────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: TypeScript tests
        run: |
          npm --prefix npm ci
          npm --prefix npm test

      - uses: actions/upload-artifact@v4
        with:
          name: muninn-macos
          path: build/muninn.dylib

  # ── macOS Universal Binary ──────────────────────────────
  build-macos-universal:
    runs-on: macos-15
    name: Build (macOS Universal Binary)
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: macos-universal
          evict-old-files: 1d

      - name: Build arm64 (llama.cpp + muninn)
        run: make ARCH=arm64 all

      - name: Save arm64 binary
        run: cp build/muninn.dylib muninn_arm64.dylib

      - name: Clean build dir (keep ccache)
        run: make clean

      - name: Build x86_64 (llama.cpp + muninn)
        run: make ARCH=x86_64 all

      - name: Create universal binary
        run: |
          lipo -create muninn_arm64.dylib build/muninn.dylib -output build/muninn_universal.dylib
          mv build/muninn_universal.dylib build/muninn.dylib
          rm -f muninn_arm64.dylib
          lipo -info build/muninn.dylib

      - uses: actions/upload-artifact@v4
        with:
          name: muninn-macos-universal
          path: build/muninn.dylib

  # ── Sanitizers (Linux only) ──────────────────────────────
  sanitize:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        sanitizer:
          - name: ASan+UBSan
            flags: "-fsanitize=address,undefined -fno-sanitize-recover=all"
    name: Sanitize (${{ matrix.sanitizer.name }})
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # No ccache here: --coverage needs real compilation to produce .gcno files
      - name: Install build dependencies
        run: sudo apt-get install -y libsqlite3-dev llvm

      - name: Build and test with ${{ matrix.sanitizer.name }}
        run: |
          CCACHE_DISABLE=1 GCOV_EXECUTABLE="llvm-cov gcov" CC=clang make test \
            CFLAGS_EXTRA="${{ matrix.sanitizer.flags }} -g -O1 -fno-omit-frame-pointer"

  # ── Amalgamation ─────────────────────────────────────────
  amalgamation:
    runs-on: ubuntu-22.04
    name: Amalgamation
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Create amalgamation
        run: make amalgamation

      - name: Verify amalgamation compiles (syntax check only)
        run: |
          cc -O2 -fPIC -shared dist/muninn.c -o dist/muninn.so \
            -Ivendor/llama.cpp/include -Ivendor/llama.cpp/ggml/include \
            -lm 2>&1 || echo "Note: link errors expected without llama.cpp libs"
          ls -la dist/muninn.c dist/muninn.h

      - uses: actions/upload-artifact@v4
        with:
          name: amalgamation
          path: |
            dist/muninn.c
            dist/muninn.h

  # ── Package Install Tests ────────────────────────────────
  package-install:
    runs-on: ubuntu-22.04
    name: Package Install Tests
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: package-install
          evict-old-files: 1d

      - name: Install SQLite dev headers
        run: sudo apt-get install -y libsqlite3-dev

      - name: Build extension
        run: make all

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build npm package
        run: |
          npm --prefix npm ci
          npm --prefix npm run build

      - name: Run install integration tests
        run: |
          uv sync --group dev
          uv run pytest pytests/test_install.py -v -m integration --override-ini="addopts="

  # ── WASM Build ───────────────────────────────────────────
  wasm:
    runs-on: ubuntu-22.04
    name: WASM Build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/cache@v5
        with:
          path: vendor/llama.cpp/build-wasm
          key: llama-wasm-${{ hashFiles('.gitmodules') }}

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build WASM (lite, no llama.cpp)
        run: make build-wasm-lite

      - uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: |
            build/wasm/muninn_sqlite3.js
            build/wasm/muninn_sqlite3.wasm
