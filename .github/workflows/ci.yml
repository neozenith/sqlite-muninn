  # ── FOCUS: macOS Build (the only failing job) ──────────────
  build-macos:
    runs-on: macos-15
    name: Build (macOS Universal)
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: macos-15
          evict-old-files: 1d

      # ── Build llama.cpp ──────────────────────────────────
      - name: Build llama.cpp (CMake configure)
        run: |
          LLAMA_CMAKE_FLAGS=$(uv run scripts/generate_build.py query LLAMA_CMAKE_FLAGS)
          echo "::group::CMake flags"
          echo "$LLAMA_CMAKE_FLAGS" | tr ' ' '\n'
          echo "::endgroup::"
          cmake -B vendor/llama.cpp/build -S vendor/llama.cpp $LLAMA_CMAKE_FLAGS

      - name: Build llama.cpp (compile)
        run: cmake --build vendor/llama.cpp/build --config MinSizeRel -j

      # ── Build muninn extension ───────────────────────────
      - name: Build muninn extension
        run: make all

      # ── C unit tests ─────────────────────────────────────
      - name: Run C unit tests
        run: make test

      # ── SQLite CLI smoke test ────────────────────────────
      - name: SQLite CLI smoke test
        run: |
          SQLITE3="$(brew --prefix sqlite)/bin/sqlite3"
          "$SQLITE3" :memory: ".load ./build/muninn" "SELECT 1"

      # ── Python integration tests ─────────────────────────
      - name: Cache .venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-macos-${{ hashFiles('uv.lock') }}

      - name: Sync Python environment
        run: uv sync --group dev

      - uses: actions/cache@v5
        with:
          path: models
          key: gguf-test-models

      - name: Verify sqlite3 has extension loading
        run: uv run python -c "import sqlite3; c=sqlite3.connect(':memory:'); c.enable_load_extension(True); print('OK: enable_load_extension works')"

      - name: Python integration tests
        run: uv run pytest pytests/ -v

      # ── Node.js tests ────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: TypeScript tests
        run: |
          npm --prefix npm ci
          npm --prefix npm test

      - uses: actions/upload-artifact@v4
        with:
          name: muninn-macos
          path: build/muninn.dylib

