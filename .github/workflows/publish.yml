name: Publish

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # ── Resolve version from VERSION on main, create DRAFT release ─────────
  # The workflow is the sole owner of the release lifecycle:
  #   1. read VERSION (on main)
  #   2. resolve main → SHA (pin all downstream jobs to this SHA)
  #   3. fail fast if tag or release already exists
  #   4. create draft release + tag at that SHA via `gh release create`
  # Every subsequent job uses `needs.prepare.outputs.sha` to check out the
  # exact commit — this avoids drift if someone merges to main mid-run.
  prepare:
    runs-on: ubuntu-latest
    name: Prepare draft release
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      sha: ${{ steps.meta.outputs.sha }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve version, SHA, prerelease flag
        id: meta
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          TAG="v$VERSION"
          SHA=$(git rev-parse HEAD)

          if echo "$VERSION" | grep -q "alpha"; then
            IS_PRERELEASE=true
            NPM_TAG=alpha
          elif echo "$VERSION" | grep -q "beta"; then
            IS_PRERELEASE=true
            NPM_TAG=beta
          elif echo "$VERSION" | grep -q "rc"; then
            IS_PRERELEASE=true
            NPM_TAG=rc
          else
            IS_PRERELEASE=false
            NPM_TAG=latest
          fi

          {
            echo "version=$VERSION"
            echo "tag=$TAG"
            echo "sha=$SHA"
            echo "is_prerelease=$IS_PRERELEASE"
            echo "npm_tag=$NPM_TAG"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Preparing $TAG at $SHA (prerelease=$IS_PRERELEASE, npm_tag=$NPM_TAG)"

      - name: Fail fast if tag or release already exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::Release '$TAG' already exists."
            echo "::error::Delete it first:  gh release delete $TAG --cleanup-tag --yes"
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "::error::Tag '$TAG' already exists on origin but no release found."
            echo "::error::Delete the tag first:  git push origin :refs/tags/$TAG"
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          SHA: ${{ steps.meta.outputs.sha }}
          IS_PRERELEASE: ${{ steps.meta.outputs.is_prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          # shellcheck disable=SC2086
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --target "$SHA" \
            --title "$TAG" \
            --draft \
            --generate-notes \
            $PRERELEASE_FLAG

  # ── Linux x86_64 ─────────────────────────────────────────
  linux-x64:
    needs: prepare
    runs-on: ubuntu-22.04
    name: Build (linux-x86_64)
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: ubuntu-22.04
          max-size: 200M
          evict-old-files: 1d

      - name: Build extension
        run: make all

      - name: Run C unit tests
        run: make test-c

      - name: Copy binary into Python package
        run: cp build/muninn.so sqlite_muninn/

      - name: Build and retag wheel
        run: |
          uv build --wheel
          uvx wheel tags --platform-tag=manylinux_2_17_x86_64 --remove dist/*.whl

      - uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64
          path: build/muninn.so

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-linux-x86_64
          path: dist/*.whl

  # ── Linux ARM64 ──────────────────────────────────────────
  linux-arm64:
    needs: prepare
    runs-on: ubuntu-22.04-arm
    name: Build (linux-arm64)
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: ubuntu-22.04-arm
          max-size: 200M
          evict-old-files: 1d

      - name: Build extension
        run: make all

      - name: Run C unit tests
        run: make test-c

      - name: Copy binary into Python package
        run: cp build/muninn.so sqlite_muninn/

      - name: Build and retag wheel
        run: |
          uv build --wheel
          uvx wheel tags --platform-tag=manylinux_2_17_aarch64 --remove dist/*.whl

      - uses: actions/upload-artifact@v7
        with:
          name: linux-arm64
          path: build/muninn.so

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-linux-arm64
          path: dist/*.whl

  # ── Windows x86_64 ──────────────────────────────────────
  windows-x64:
    needs: prepare
    runs-on: windows-2022
    name: Build (windows-x86_64)
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Generate Windows build script
        run: python3 scripts/generate_build.py windows

      - name: Build extension
        shell: cmd
        run: build\generated\build_windows.bat

      - name: Copy binary into Python package
        run: cp build/muninn.dll sqlite_muninn/
        shell: bash

      - name: Build and retag wheel
        run: |
          uv build --wheel
          uvx wheel tags --platform-tag=win_amd64 --remove dist/*.whl
        shell: bash

      - uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: build/muninn.dll

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-windows-x86_64
          path: dist/*.whl

  # ── macOS arm64 ───────────────────────────────────────
  build-macos-arm64:
    needs: prepare
    runs-on: macos-15
    name: Build (macos-arm64)
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: macos-arm64
          max-size: 200M
          evict-old-files: 1d

      - name: Build extension (arm64)
        run: make ARCH=arm64 all

      - uses: actions/upload-artifact@v7
        with:
          name: macos-arm64
          path: build/muninn.dylib

  # ── macOS x86_64 ─────────────────────────────────────
  build-macos-x86_64:
    needs: prepare
    runs-on: macos-15
    name: Build (macos-x86_64)
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: macos-x86_64
          max-size: 200M
          evict-old-files: 1d

      - name: Build extension (x86_64)
        run: make ARCH=x86_64 all

      - uses: actions/upload-artifact@v7
        with:
          name: macos-x86_64
          path: build/muninn.dylib

  # ── macOS Universal Binary (lipo + wheel) ────────────
  build-macos-universal:
    needs: [prepare, build-macos-arm64, build-macos-x86_64]
    runs-on: macos-15
    name: Build (macos-universal)
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/download-artifact@v7
        with:
          name: macos-arm64
          path: arm64/

      - uses: actions/download-artifact@v7
        with:
          name: macos-x86_64
          path: x86_64/

      - name: Create universal binary
        run: |
          mkdir -p build
          lipo -create arm64/muninn.dylib x86_64/muninn.dylib -output build/muninn.dylib
          lipo -info build/muninn.dylib

      - name: Copy binary into Python package
        run: cp build/muninn.dylib sqlite_muninn/

      - name: Build and retag wheel
        run: |
          uv build --wheel
          uvx wheel tags --platform-tag=macosx_11_0_universal2 --remove dist/*.whl

      - uses: actions/upload-artifact@v7
        with:
          name: macos-universal
          path: build/muninn.dylib

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-macos-universal
          path: dist/*.whl

  # ── Amalgamation ─────────────────────────────────────────
  amalgamation:
    needs: prepare
    runs-on: ubuntu-22.04
    name: Amalgamation
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: make amalgamation
      - run: tar czf muninn-amalgamation.tar.gz -C dist muninn.c muninn.h

      - uses: actions/upload-artifact@v7
        with:
          name: amalgamation
          path: muninn-amalgamation.tar.gz

  # ── WASM Build ───────────────────────────────────────────
  wasm-build:
    needs: prepare
    runs-on: ubuntu-22.04
    name: WASM Build
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: wasm
          max-size: 200M
          evict-old-files: 1d

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build WASM (full, with llama.cpp)
        run: make build-wasm

      - uses: actions/upload-artifact@v7
        with:
          name: wasm
          path: |
            build/wasm/muninn_sqlite3.js
            build/wasm/muninn_sqlite3.wasm

  # ── Upload build artifacts to the DRAFT release ─────────
  # Draft releases are mutable, so asset upload succeeds here. The draft is
  # flipped to published at the very end by `finalize-release`.
  upload-release:
    needs:
      - prepare
      - linux-x64
      - linux-arm64
      - windows-x64
      - build-macos-universal
      - amalgamation
      - wasm-build
    runs-on: ubuntu-latest
    name: Upload release assets
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7

      - name: Rename artifacts for unique asset names
        run: |
          mv linux-x86_64/muninn.so muninn-linux-x86_64.so
          mv linux-arm64/muninn.so muninn-linux-arm64.so
          mv macos-universal/muninn.dylib muninn-macos-universal.dylib
          mv windows-x86_64/muninn.dll muninn-windows-x86_64.dll

      - name: Upload to GitHub Release draft
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release upload "$TAG" \
            --repo "${{ github.repository }}" \
            muninn-linux-x86_64.so \
            muninn-linux-arm64.so \
            muninn-macos-universal.dylib \
            muninn-windows-x86_64.dll \
            amalgamation/muninn-amalgamation.tar.gz \
            wasm/muninn_sqlite3.js \
            wasm/muninn_sqlite3.wasm

  # ── Publish to PyPI ─────────────────────────────────────
  publish-pypi:
    needs:
      - prepare
      - linux-x64
      - linux-arm64
      - windows-x64
      - build-macos-universal
    runs-on: ubuntu-latest
    name: Publish to PyPI
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - uses: astral-sh/setup-uv@v7

      - name: Publish to PyPI
        run: uv publish dist/*.whl

  # ── Publish to NPM ──────────────────────────────────────
  publish-npm:
    needs:
      - prepare
      - linux-x64
      - linux-arm64
      - windows-x64
      - build-macos-universal
      - wasm-build
    runs-on: ubuntu-latest
    name: Publish to NPM
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions/download-artifact@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for Trusted Publishing
        # Node 24 ships an npm that's new enough for Trusted Publishing (npm 11.5.1+).
        # Avoid `npm install -g npm@...` — see actions/runner-images#13883 where the
        # Node 22.22.2 toolcache shipped a broken npm whose self-upgrade crashed on a
        # missing `promise-retry`. Node 24's bundled npm sidesteps that class of bug.
        run: npm --version

      - name: Generate npm sub-packages
        run: python3 scripts/generate_build.py npm

      - name: Copy binaries into platform packages
        run: |
          cp linux-x86_64/muninn.so    dist/nodejs/platforms/linux-x64/muninn.so
          cp linux-arm64/muninn.so     dist/nodejs/platforms/linux-arm64/muninn.so
          cp windows-x86_64/muninn.dll dist/nodejs/platforms/win32-x64/muninn.dll
          cp macos-universal/muninn.dylib dist/nodejs/platforms/darwin-arm64/muninn.dylib
          cp macos-universal/muninn.dylib dist/nodejs/platforms/darwin-x64/muninn.dylib

      - name: Publish darwin-arm64
        run: npm publish dist/nodejs/platforms/darwin-arm64 --provenance --access public --tag ${{ needs.prepare.outputs.npm_tag }}

      - name: Publish darwin-x64
        run: npm publish dist/nodejs/platforms/darwin-x64 --provenance --access public --tag ${{ needs.prepare.outputs.npm_tag }}

      - name: Publish linux-x64
        run: npm publish dist/nodejs/platforms/linux-x64 --provenance --access public --tag ${{ needs.prepare.outputs.npm_tag }}

      - name: Publish linux-arm64
        run: npm publish dist/nodejs/platforms/linux-arm64 --provenance --access public --tag ${{ needs.prepare.outputs.npm_tag }}

      - name: Publish win32-x64
        run: npm publish dist/nodejs/platforms/win32-x64 --provenance --access public --tag ${{ needs.prepare.outputs.npm_tag }}

      - name: Install main package dependencies
        working-directory: npm
        run: npm install

      - name: Publish main package
        run: npm publish ./npm --provenance --access public --tag ${{ needs.prepare.outputs.npm_tag }}

      - name: Copy WASM artifacts into package
        run: |
          cp wasm/muninn_sqlite3.js dist/nodejs/platforms/wasm/muninn_sqlite3.js
          cp wasm/muninn_sqlite3.wasm dist/nodejs/platforms/wasm/muninn_sqlite3.wasm

      - name: Publish WASM package
        run: npm publish dist/nodejs/platforms/wasm --provenance --access public --tag ${{ needs.prepare.outputs.npm_tag }}

  # ── Flip draft → published (runs LAST) ──────────────────
  # Only flip the release to published once PyPI + NPM + asset upload all
  # succeeded. If any upstream job fails, the draft stays around with whatever
  # assets made it — debug, delete, fix, re-run.
  finalize-release:
    needs:
      - prepare
      - upload-release
      - publish-pypi
      - publish-npm
    runs-on: ubuntu-latest
    name: Publish release
    permissions:
      contents: write
    steps:
      - name: Flip draft → published
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release edit "$TAG" \
            --repo "${{ github.repository }}" \
            --draft=false
          echo "::notice::Released $TAG"
