name: Publish

on:
  release:
    types: [published]
  # TEMPORARY: also run on PRs to verify build steps work
  pull_request:
    branches: [main]
  # workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Linux x86_64 ─────────────────────────────────────────
  linux-x64:
    runs-on: ubuntu-22.04
    name: Build (linux-x86_64)
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ubuntu-22.04
          evict-old-files: 1d

      - name: Build extension
        run: make all

      - name: Run C unit tests
        run: make test

      - name: Copy binary into Python package
        run: cp build/muninn.so sqlite_muninn/

      - name: Build and retag wheel
        run: |
          uv build --wheel
          uvx wheel tags --platform-tag=manylinux_2_17_x86_64 --remove dist/*.whl

      - uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64
          path: build/muninn.so

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-linux-x86_64
          path: dist/*.whl

  # ── Linux ARM64 ──────────────────────────────────────────
  linux-arm64:
    runs-on: ubuntu-22.04-arm
    name: Build (linux-arm64)
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ubuntu-22.04-arm
          evict-old-files: 1d

      - name: Build extension
        run: make all

      - name: Run C unit tests
        run: make test

      - name: Copy binary into Python package
        run: cp build/muninn.so sqlite_muninn/

      - name: Build and retag wheel
        run: |
          uv build --wheel
          uvx wheel tags --platform-tag=manylinux_2_17_aarch64 --remove dist/*.whl

      - uses: actions/upload-artifact@v7
        with:
          name: linux-arm64
          path: build/muninn.so

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-linux-arm64
          path: dist/*.whl

  # ── Windows x86_64 ──────────────────────────────────────
  windows-x64:
    runs-on: windows-2022
    name: Build (windows-x86_64)
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Generate Windows build script
        run: python3 scripts/generate_build.py windows

      - name: Build extension
        shell: cmd
        run: build\generated\build_windows.bat

      - name: Copy binary into Python package
        run: cp build/muninn.dll sqlite_muninn/
        shell: bash

      - name: Build and retag wheel
        run: |
          uv build --wheel
          uvx wheel tags --platform-tag=win_amd64 --remove dist/*.whl
        shell: bash

      - uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: build/muninn.dll

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-windows-x86_64
          path: dist/*.whl

  # ── macOS arm64 ───────────────────────────────────────
  build-macos-arm64:
    runs-on: macos-15
    name: Build (macos-arm64)
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: macos-arm64
          evict-old-files: 1d

      - name: Build extension (arm64)
        run: make ARCH=arm64 all

      - uses: actions/upload-artifact@v7
        with:
          name: macos-arm64
          path: build/muninn.dylib

  # ── macOS x86_64 ─────────────────────────────────────
  build-macos-x86_64:
    runs-on: macos-15
    name: Build (macos-x86_64)
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: macos-x86_64
          evict-old-files: 1d

      - name: Build extension (x86_64)
        run: make ARCH=x86_64 all

      - uses: actions/upload-artifact@v7
        with:
          name: macos-x86_64
          path: build/muninn.dylib

  # ── macOS Universal Binary (lipo + wheel) ────────────
  build-macos-universal:
    needs: [build-macos-arm64, build-macos-x86_64]
    runs-on: macos-15
    name: Build (macos-universal)
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/download-artifact@v7
        with:
          name: macos-arm64
          path: arm64/

      - uses: actions/download-artifact@v7
        with:
          name: macos-x86_64
          path: x86_64/

      - name: Create universal binary
        run: |
          mkdir -p build
          lipo -create arm64/muninn.dylib x86_64/muninn.dylib -output build/muninn.dylib
          lipo -info build/muninn.dylib

      - name: Copy binary into Python package
        run: cp build/muninn.dylib sqlite_muninn/

      - name: Build and retag wheel
        run: |
          uv build --wheel
          uvx wheel tags --platform-tag=macosx_11_0_universal2 --remove dist/*.whl

      - uses: actions/upload-artifact@v7
        with:
          name: macos-universal
          path: build/muninn.dylib

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-macos-universal
          path: dist/*.whl

  # ── Amalgamation ─────────────────────────────────────────
  amalgamation:
    runs-on: ubuntu-22.04
    name: Amalgamation
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: make amalgamation
      - run: tar czf muninn-amalgamation.tar.gz -C dist muninn.c muninn.h

      - uses: actions/upload-artifact@v7
        with:
          name: amalgamation
          path: muninn-amalgamation.tar.gz

  # ── WASM Build ───────────────────────────────────────────
  wasm-build:
    runs-on: ubuntu-22.04
    name: WASM Build
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: wasm
          evict-old-files: 1d

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build WASM (full, with llama.cpp)
        run: make build-wasm

      - uses: actions/upload-artifact@v7
        with:
          name: wasm
          path: |
            build/wasm/muninn_sqlite3.js
            build/wasm/muninn_sqlite3.wasm

